name: sparkie-studio
services:
  - name: sparkie-studio
    github:
      repo: Draguniteus/sparkie-studio
      branch: master
      deploy_on_push: true
    source_dir: /
    environment_slug: node-js
    build_command: NODE_OPTIONS="--max-old-space-size=896" npm run build
    run_command: npm start
    http_port: 3000
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    health check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 240
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    routes:
      - path: /api/terminal-ws
        websocket: true
      - path: /api/proactive-ws
        websocket: true
    envs:
      - key: ACE_MUSIC_API_KEY
        value: d33f8bc6767445a98b608dbf56710d26
        type: SECRET
        scope: RUN_AND_BUILD_TIME
databases:
  - name: sparkie-db
    engine: PG
    version: "17"
region: nyc
